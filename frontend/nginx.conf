server {
    listen 80;
    server_name localhost;

    # Directorio donde están los archivos estáticos de React (construidos)
    root /usr/share/nginx/html;
    index index.html;

    # Configuración para React Router (SPA)
    # Si no encuentra el archivo, redirige a index.html para que React maneje la ruta
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para las llamadas a la API
    # Redirige cualquier petición que empiece por /api al contenedor del backend
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_cache_bypass $http_upgrade;
    }
}
