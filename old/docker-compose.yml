version: '3.8'

services:
  # Servicio del Backend (FastAPI)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: guia_estudiantil_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # Carga las variables de entorno desde el archivo .env en la carpeta backend
    env_file:
      - ./backend/.env
    # Reinicia el contenedor automáticamente si falla
    restart: "no"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Servicio del Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: guia_estudiantil_frontend
    ports:
      - "3000:80"  # Mapea el puerto 3000 de tu PC al puerto 80 del contenedor (Nginx)
    depends_on:
      - backend
    restart: "no"

  # (Opcional) Base de datos MongoDB local
  # Si decides usar esto en lugar de Atlas, descomenta las líneas de abajo
  # y actualiza la variable MONGODB_URI en el servicio backend.
  # mongodb:
  #   image: mongo:latest
  #   container_name: guia_estudiantil_db
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongodb_data:/data/db

# Volúmenes persistentes (solo si usas la BD local)
# volumes:
#   mongodb_data:
